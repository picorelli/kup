global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'predictor'
    static_configs:
      - targets: ['predictor:8080']
    scrape_interval: 5s
    metrics_path: /metrics

  - job_name: 'router'
    static_configs:
      - targets: ['router:9200']
    scrape_interval: 5s
    metrics_path: /metrics

  - job_name: 'service-a'
    static_configs:
      - targets: ['service_a:9100']
    scrape_interval: 5s
    metrics_path: /metrics

  - job_name: 'service-b'
    static_configs:
      - targets: ['service_b:9100']
    scrape_interval: 5s
    metrics_path: /metrics
