# Helm values para prometheus-community/prometheus-adapter
# Formato correto para passar regras ao chart via -f

rules:
  external:
    # RPS observado real — usado pelo HPA reativo
    - seriesQuery: 'service_process_seconds_count{service=~"service-.*",namespace!=""}'
      resources:
        overrides:
          namespace:
            resource: namespace
      name:
        as: "observed_rps"
      metricsQuery: 'sum(rate(service_process_seconds_count{<<.LabelMatchers>>}[1m])) by (service)'

    - seriesQuery: 'predicted_rps{service!=""}'
      resources:
        overrides:
          namespace:
            resource: namespace
      name:
        matches: "predicted_rps"
        as: "predicted_rps"
      metricsQuery: 'predicted_rps{<<.LabelMatchers>>}'

    - seriesQuery: 'predicted_latency_seconds{service!=""}'
      resources:
        overrides:
          namespace:
            resource: namespace
      name:
        matches: "predicted_latency_seconds"
        as: "predicted_latency"
      metricsQuery: 'predicted_latency_seconds{<<.LabelMatchers>>}'

  custom:
    - seriesQuery: 'http_requests_total{namespace!="",pod!=""}'
      resources:
        overrides:
          namespace:
            resource: namespace
          pod:
            resource: pod
      name:
        matches: "^(.*)_total$"
        as: "${1}_per_second"
      metricsQuery: 'rate(<<.Series>>{<<.LabelMatchers>>}[2m])'

    - seriesQuery: 'http_request_duration_seconds_bucket{namespace!="",pod!=""}'
      resources:
        overrides:
          namespace:
            resource: namespace
          pod:
            resource: pod
      name:
        matches: "^(.*)_bucket$"
        as: "${1}_p95"
      metricsQuery: 'histogram_quantile(0.95, rate(<<.Series>>{<<.LabelMatchers>>}[2m]))'

  resource:
    cpu:
      containerQuery: 'sum(rate(container_cpu_usage_seconds_total{<<.LabelMatchers>>}[3m])) by (<<.GroupBy>>)'
      nodeQuery: 'sum(rate(container_cpu_usage_seconds_total{<<.LabelMatchers>>, id="/"}[3m])) by (<<.GroupBy>>)'
      resources:
        overrides:
          namespace:
            resource: namespace
          pod:
            resource: pod
          node:
            resource: node
      containerLabel: container
    memory:
      containerQuery: 'sum(container_memory_working_set_bytes{<<.LabelMatchers>>}) by (<<.GroupBy>>)'
      nodeQuery: 'sum(container_memory_working_set_bytes{<<.LabelMatchers>>,id="/"}) by (<<.GroupBy>>)'
      resources:
        overrides:
          namespace:
            resource: namespace
          pod:
            resource: pod
          node:
            resource: node
      containerLabel: container
