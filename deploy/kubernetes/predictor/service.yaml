apiVersion: v1
kind: Service
metadata:
  name: predictor
  namespace: predictive-hpa
  labels:
    app: predictor
    app.kubernetes.io/name: predictive-hpa-predictor
    app.kubernetes.io/component: predictor
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  - port: 9091
    targetPort: metrics
    protocol: TCP
    name: metrics
  selector:
    app: predictor
