# Workload Services para experimentos de escalonamento preditivo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a
  namespace: predictive-hpa
  labels:
    app: service-a
    app.kubernetes.io/name: predictive-hpa-workload
    app.kubernetes.io/component: service-a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-a
  template:
    metadata:
      labels:
        app: service-a
        app.kubernetes.io/name: predictive-hpa-workload
        app.kubernetes.io/component: service-a
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: service-a
        image: predictive-hpa-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 9100
          name: metrics
        env:
        - name: SERVICE_NAME
          value: "service-a"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: service-a
  namespace: predictive-hpa
  labels:
    app: service-a
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  - port: 9100
    targetPort: 9100
    name: metrics
  selector:
    app: service-a
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-b
  namespace: predictive-hpa
  labels:
    app: service-b
    app.kubernetes.io/name: predictive-hpa-workload
    app.kubernetes.io/component: service-b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-b
  template:
    metadata:
      labels:
        app: service-b
        app.kubernetes.io/name: predictive-hpa-workload
        app.kubernetes.io/component: service-b
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: service-b
        image: predictive-hpa-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 9100
          name: metrics
        env:
        - name: SERVICE_NAME
          value: "service-b"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: service-b
  namespace: predictive-hpa
  labels:
    app: service-b
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  - port: 9100
    targetPort: 9100
    name: metrics
  selector:
    app: service-b
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: router
  namespace: predictive-hpa
  labels:
    app: router
    app.kubernetes.io/name: predictive-hpa-workload
    app.kubernetes.io/component: router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: router
  template:
    metadata:
      labels:
        app: router
        app.kubernetes.io/name: predictive-hpa-workload
        app.kubernetes.io/component: router
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9200"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: router
        image: predictive-hpa-router:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 9200
          name: metrics
        env:
        - name: SERVICE_A_URL
          value: "http://service-a:8000/process"
        - name: SERVICE_B_URL
          value: "http://service-b:8000/process"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: router
  namespace: predictive-hpa
  labels:
    app: router
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    name: http
  - port: 9200
    targetPort: 9200
    name: metrics
  selector:
    app: router
